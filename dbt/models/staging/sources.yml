version: 2

sources:
  - name: datawarehouse
    description: >
      Tables already present in the data warehouse, loaded by the existing Python ETL.
      These can be used as sources immediately without FDW.
    schema: public
    tables:
      - name: teledeclarations
        description: Télédéclarations loaded by the Python ETL.
      - name: canteens
        description: Canteens loaded by the Python ETL.

  - name: production
    description: >
      Production tables exposed on the data warehouse via Foreign Data Wrapper.
      The `production` schema is created by dbt/setup/fdw_setup.sql and maps
      the production `public` schema through postgres_fdw.
    schema: production
    tables:
      - name: data_canteen
        description: Canteens registered on the platform.
        columns:
          - name: id
            description: Primary key.
            tests:
              - unique
              - not_null
          - name: siret
            description: SIRET identifier (14 digits).
          - name: name
            description: Canteen name.
          - name: city_insee_code
            description: INSEE code of the commune.
          - name: department
            description: Department INSEE code.
          - name: region
            description: Region INSEE code.
          - name: production_type
            description: "Production type: central, central_serving, on_site, on_site_central, groupe."
          - name: management_type
            description: "Management type: direct, conceded."
          - name: economic_model
            description: "Economic model: public, private."
          - name: yearly_meal_count
            description: Declared yearly number of meals served.
          - name: daily_meal_count
            description: Declared daily number of meals served.
          - name: satellite_canteens_count
            description: Number of satellites for central kitchens.
          - name: creation_date
            description: Record creation timestamp.
          - name: modification_date
            description: Record last update timestamp.

      - name: data_teledeclaration
        description: Télédéclarations submitted by canteens (one per canteen per campaign year).
        columns:
          - name: id
            description: Primary key.
            tests:
              - unique
              - not_null
          - name: canteen_id
            description: FK to data_canteen.
            tests:
              - not_null
          - name: year
            description: Campaign year.
          - name: status
            description: "Submission status: submitted, cancelled."
          - name: creation_date
            description: Submission timestamp.
          - name: declared_data
            description: JSONB snapshot of all declared values at submission time.

      - name: data_diagnostic
        description: >
          Diagnostics entered by canteen managers, including appro quality breakdown.
          A diagnostic can be teledeclared or not.
        columns:
          - name: id
            description: Primary key.
            tests:
              - unique
              - not_null
          - name: canteen_id
            description: FK to data_canteen.
            tests:
              - not_null
          - name: year
            description: Year the diagnostic covers.
          - name: value_total_ht
            description: Total purchase value excl. tax (euros).
          - name: value_bio_ht
            description: Bio purchase value excl. tax.
          - name: value_sustainable_ht
            description: Sustainable quality purchase value excl. tax.

      - name: data_sector
        description: Sector reference table (school, hospital, company restaurant, etc.).
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: name
            description: Sector label.
          - name: category
            description: Sector category grouping.

      - name: data_canteen_sectors
        description: Many-to-many join between canteens and sectors.
        columns:
          - name: canteen_id
            tests:
              - not_null
          - name: sector_id
            tests:
              - not_null
